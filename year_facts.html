<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />
    <style>
      hr {
        display: none;
      }
      #factContainer {
        display: none;
      }
    </style>
    <title>Year Facts</title>
  </head>
  <body class="bg-dark">
    <div class="container-fluid">
      <div
        class="card mx-auto mt-5 p-4 bg-primary text-white"
        style="width: 25rem;"
      >
        <h2 class="card-title">Year Facts</h2>
        <p class="card-text small">Enter a year and get a random fact.</p>
        <input
          type="number"
          class="form"
          id="inputYear"
          placeholder="Enter a year.."
        />
        <hr class="bg-dark" />

        <div class="container mt-3" id="factContainer">
          <p class="text-white" id="factText"></p>
        </div>
      </div>
    </div>

    <script>
      const input = document.querySelector('input[type="number"]');
      let fact = document.querySelector("#factContainer");
      let factText = document.querySelector("#factText");

      input.addEventListener("input", () => {
        let inputValue = input.value;

        if (inputValue != "") {
          fetch(`http://numbersapi.com/${inputValue}/year`)
            .then(response => response.text())
            .then(data => {
              fact.style.display = "block";
              factText.innerText = data;
            })
            .catch(err => console.log(err));
        } else {
          fact.style.display = "none";
        }
      });
    </script>
  </body>
</html>
